{{- if .Values.rest.enabled -}}
{{- $component := "rest" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autocontrol.fullname" (merge (dict "component" $component) .) }}
  labels:
    {{- include "autocontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: {{ .Values.rest.service.type }}
  selector:
    {{- include "autocontrol.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.rest.port }}
      targetPort: http
      protocol: TCP
---
{{- end }}
{{- if .Values.remoteHost.enabled -}}
{{- $component := "remote-host" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autocontrol.fullname" (merge (dict "component" $component) .) }}
  labels:
    {{- include "autocontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: {{ .Values.remoteHost.service.type }}
  selector:
    {{- include "autocontrol.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: tcp
      port: {{ .Values.remoteHost.port }}
      targetPort: tcp
      protocol: TCP
---
{{- end }}
{{- if .Values.signaling.enabled -}}
{{- $component := "signaling" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "autocontrol.fullname" (merge (dict "component" $component) .) }}
  labels:
    {{- include "autocontrol.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: {{ .Values.signaling.service.type }}
  selector:
    {{- include "autocontrol.selectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.signaling.port }}
      targetPort: http
      protocol: TCP
{{- end }}
